name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Release Version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)

          if [[ "$TAG_VERSION" != "$MOD_VERSION" ]]; then
            echo "Tag version $TAG_VERSION does not match mod_version $MOD_VERSION"
            exit 1
          fi

      # This is needed to be able to run ./gradlew below
      # You can run `git update-index --chmod +x gradlew` then remove this step.
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Prepare Artifact Metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "artifact_name=GuGuAddons-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            cd build/libs
            for f in *.jar; do mv "$f" "${f%.jar}-$SHORT_SHA-nightly.jar"; done
            echo "artifact_name=GuGuAddons-nightly" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: build/libs/

      - name: Publish Nightly Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="nightly"
          RELEASE_TITLE="Nightly Build"
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_SUBJECT=$(git log -1 --pretty=%s)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

          NOTES="Automated nightly build for commit $SHORT_SHA.

          Full commit: ${{ github.sha }}
          Message: $COMMIT_SUBJECT
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$RELEASE_TITLE" --notes "$NOTES"

            EXISTING_ASSETS=$(gh release view "$TAG" --json assets --jq '.assets[].name')
            for asset in $EXISTING_ASSETS; do
              gh release delete-asset "$TAG" "$asset" --yes
            done
          else
            gh release create "$TAG" --title "$RELEASE_TITLE" --notes "$NOTES" --prerelease
          fi

          gh release upload "$TAG" build/libs/*.jar

      - name: Publish Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_TITLE="GuGuAddons ${GITHUB_REF_NAME}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$RELEASE_TITLE"
          else
            gh release create "$TAG" build/libs/*.jar --title "$RELEASE_TITLE" --generate-notes
            exit 0
          fi

          gh release upload "$TAG" build/libs/*.jar --clobber
